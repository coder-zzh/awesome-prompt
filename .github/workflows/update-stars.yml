name: Update GitHub Stars

on:
  schedule:
    - cron: '0 0 * * 0'  # weekly on Sunday
  workflow_dispatch:  # manual trigger

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            async function updateStars(filePath) {
              const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              for (const entry of data) {
                if (entry.sourceType === 'github' && entry.url.includes('github.com')) {
                  const parts = entry.url.replace('https://github.com/', '').split('/');
                  const owner = parts[0], repo = parts[1];
                  try {
                    const res = await github.rest.repos.get({ owner, repo });
                    entry.stars = res.data.stargazers_count;
                  } catch (e) {
                    console.log(`Failed to fetch ${entry.url}: ${e.message}`);
                  }
                }
              }
              fs.writeFileSync(filePath, JSON.stringify(data, null, 2) + '\n');
            }
            await updateStars('data/image-prompts.json');
            await updateStars('data/video-prompts.json');
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update star counts'
          title: 'chore: update star counts'
          branch: 'update-stars'
          delete-branch: true
